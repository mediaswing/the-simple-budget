name: Tests

# Run the unit tests on every push and pull request.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # pymysql is optional at runtime but the MariaDB tests reference its
      # exception types, so it must be importable here.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymysql

      - name: Run tests
        run: python -m unittest -v test_budget_app
