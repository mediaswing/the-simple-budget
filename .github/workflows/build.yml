name: Build binaries

# Build Windows, macOS, and Linux binaries. Runs on demand, and on every
# version tag (e.g. `git tag v1.0 && git push --tags`), which also attaches
# the binaries to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: TheSimpleBudget-linux
          - os: windows-latest
            artifact: TheSimpleBudget-windows
          - os: macos-latest
            artifact: TheSimpleBudget-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # pyttsx3's Linux backend talks to eSpeak; install it so the driver
      # imports at build time. (End users on Linux also need eSpeak installed.)
      - name: Install eSpeak (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y espeak

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyttsx3

      - name: Build
        run: pyinstaller --noconfirm --clean TheSimpleBudget.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    # Attach the built binaries to a GitHub Release when a tag is pushed.
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the release and upload assets
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Zip each platform's build
        run: |
          cd artifacts
          for d in */; do zip -r "../${d%/}.zip" "$d"; done
          cd ..
          ls -la *.zip
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
